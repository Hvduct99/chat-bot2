{% extends "base.html" %}
{% block title %}Đăng ký — {{ APP_NAME }}{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto bg-white rounded-lg shadow-sm p-6 mt-4">
  <div class="text-center mb-5">
    <div class="w-16 h-16 mx-auto bg-green-500 rounded-full flex items-center justify-center mb-2">
      <i class="fas fa-user-plus text-white text-2xl"></i>
    </div>
    <h2 class="text-xl font-bold text-forum-dark">Tạo tài khoản sinh viên</h2>
  </div>

  <form method="POST" class="space-y-3">
    <div class="grid grid-cols-2 gap-3">
      <div>
        <label class="block text-sm font-semibold mb-1">MSSV</label>
        <input name="student_code" placeholder="SV..." class="w-full border rounded-lg px-3 py-2 outline-none focus:ring-2 focus:ring-forum-base">
      </div>
      <div>
        <label class="block text-sm font-semibold mb-1">Họ tên *</label>
        <input name="full_name" required class="w-full border rounded-lg px-3 py-2 outline-none focus:ring-2 focus:ring-forum-base">
      </div>
    </div>

    <div>
      <label class="block text-sm font-semibold mb-1">Email *</label>
      <input type="email" name="email" required class="w-full border rounded-lg px-3 py-2 outline-none focus:ring-2 focus:ring-forum-base">
    </div>

    <div class="grid grid-cols-2 gap-3">
      <div>
        <label class="block text-sm font-semibold mb-1">Khoa</label>
        <select name="faculty_id" class="w-full border rounded-lg px-3 py-2 outline-none focus:ring-2 focus:ring-forum-base">
          <option value="">-- Chọn khoa --</option>
          {% for f in faculties %}<option value="{{ f.id }}">{{ f.name }}</option>{% endfor %}
        </select>
      </div>
      <div>
        <label class="block text-sm font-semibold mb-1">Ngành</label>
        <select name="department_id" class="w-full border rounded-lg px-3 py-2 outline-none focus:ring-2 focus:ring-forum-base">
          <option value="">-- Chọn ngành --</option>
          {% for d in departments %}<option value="{{ d.id }}">{{ d.name }}</option>{% endfor %}
        </select>
      </div>
    </div>

    <div class="grid grid-cols-2 gap-3">
      <div>
        <label class="block text-sm font-semibold mb-1">Mật khẩu *</label>
        <input type="password" name="password" required class="w-full border rounded-lg px-3 py-2 outline-none focus:ring-2 focus:ring-forum-base">
      </div>
      <div>
        <label class="block text-sm font-semibold mb-1">Xác nhận *</label>
        <input type="password" name="confirm" required class="w-full border rounded-lg px-3 py-2 outline-none focus:ring-2 focus:ring-forum-base">
      </div>
    </div>

    <button class="w-full bg-green-600 hover:bg-green-700 text-white py-2.5 rounded-lg font-semibold mt-2">
      <i class="fas fa-user-plus mr-1"></i> Tạo tài khoản
    </button>
  </form>

  <div class="text-center text-sm text-gray-600 mt-4">
    Đã có tài khoản?
    <a href="{{ url_for('auth.login') }}" class="text-forum-base font-semibold hover:underline">Đăng nhập</a>
  </div>
</div>
{% endblock %}
