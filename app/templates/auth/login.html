{% extends "base.html" %}
{% block title %}Đăng nhập — {{ APP_NAME }}{% endblock %}
{% block content %}
<div class="max-w-md mx-auto bg-white rounded-lg shadow-sm p-6 mt-6">
  <div class="text-center mb-5">
    <div class="w-16 h-16 mx-auto bg-forum-base rounded-full flex items-center justify-center mb-2">
      <i class="fas fa-user text-white text-2xl"></i>
    </div>
    <h2 class="text-xl font-bold text-forum-dark">Đăng nhập UniReg</h2>
    <p class="text-xs text-gray-500">Truy cập diễn đàn & UniBot</p>
  </div>

  <form method="POST" class="space-y-4">
    <div>
      <label class="block text-sm font-semibold mb-1">Email</label>
      <input type="email" name="email" required
        class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-forum-base outline-none"
        placeholder="email@unireg.edu.vn">
    </div>
    <div>
      <label class="block text-sm font-semibold mb-1">Mật khẩu</label>
      <input type="password" name="password" required
        class="w-full border rounded-lg px-3 py-2 focus:ring-2 focus:ring-forum-base outline-none">
    </div>
    <button class="w-full bg-forum-base hover:bg-forum-dark text-white py-2.5 rounded-lg font-semibold">
      <i class="fas fa-sign-in-alt mr-1"></i> Đăng nhập
    </button>
  </form>

  <div class="text-center text-sm text-gray-600 mt-4">
    Chưa có tài khoản?
    <a href="{{ url_for('auth.register') }}" class="text-forum-base font-semibold hover:underline">Đăng ký</a>
  </div>

  <div class="mt-5 bg-blue-50 border border-blue-200 rounded p-3 text-xs text-blue-800">
    <b>Tài khoản mẫu:</b><br>
    Admin: admin@unireg.edu.vn / admin123<br>
    SV: sv001@student.edu.vn / 123456
  </div>
</div>
{% endblock %}
